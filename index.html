<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Простір Розвитку</title>
  
  <!-- Tailwind CSS для дизайну -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Material Symbols для іконок -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet" />
  
  <!-- React для роботи логіки -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { 
        margin: 0; 
        background-color: #fafaf9; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    /* Налаштування стилів іконок */
    .material-symbols-rounded {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      user-select: none;
    }
    .material-symbols-rounded.filled {
      font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    /* Прості анімації появи */
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    .slide-in { animation: slideIn 0.4s ease-out; }
    
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="text-stone-800 selection:bg-teal-100">
  
  <!-- Місце, куди завантажиться наш застосунок -->
  <div id="root"></div>

  <!-- Весь код застосунку -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- КОМПОНЕНТ ДЛЯ ІКОНОК ---
    const Icon = ({ name, filled = false, size = 24, className = "" }) => (
      <span 
        className={`material-symbols-rounded ${filled ? 'filled' : ''} ${className}`} 
        style={{ fontSize: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size }}
      >
        {name}
      </span>
    );

    // --- ДОПОМІЖНІ ФУНКЦІЇ ---
    const formatTime = (totalSeconds) => {
      const m = Math.floor(totalSeconds / 60);
      const s = Math.floor(totalSeconds % 60);
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    };

    const playSoftChime = () => {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.type = 'sine'; 
        oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
        oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5); 

        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);

        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 2.5);
      } catch (e) {
        console.log("Audio not supported");
      }
    };

    const calculateTaskTimes = (tasks, totalMinutes, mode) => {
      if (tasks.length === 0) return [];
      const totalSeconds = totalMinutes * 60;

      if (mode === 'even') {
        const timePerTask = totalSeconds / tasks.length;
        return tasks.map(t => ({ ...t, assignedSeconds: timePerTask }));
      } else {
        const weightMap = { 'low': 1, 'medium': 2, 'high': 3 };
        const totalWeight = tasks.reduce((sum, t) => sum + weightMap[t.priority], 0);
        const timePerWeightUnit = totalSeconds / totalWeight;
        
        return tasks.map(t => ({ 
          ...t, 
          assignedSeconds: timePerWeightUnit * weightMap[t.priority] 
        }));
      }
    };

    // --- ГОЛОВНИЙ КОМПОНЕНТ APP ---
    function App() {
      const [currentView, setCurrentView] = useState('dashboard');
      const [history, setHistory] = useState([]);
      const [soundEnabled, setSoundEnabled] = useState(true);

      const [blockConfig, setBlockConfig] = useState({
        title: 'Фокус-блок',
        workDuration: 60,
        breakDuration: 10,
        distributionMode: 'even',
        tasks: []
      });

      const [activeSession, setActiveSession] = useState(null);

      const renderView = () => {
        switch (currentView) {
          case 'dashboard':
            return <DashboardView 
                      goToCreate={() => setCurrentView('create')} 
                      goToHistory={() => setCurrentView('history')}
                      history={history}
                   />;
          case 'create':
            return <CreateBlockView 
                      config={blockConfig} 
                      setConfig={setBlockConfig} 
                      goBack={() => setCurrentView('dashboard')}
                      startBlock={(sessionData) => {
                        setActiveSession(sessionData);
                        setCurrentView('active');
                        if(soundEnabled) playSoftChime();
                      }}
                   />;
          case 'active':
            return <ActiveBlockView 
                      session={activeSession}
                      updateSession={setActiveSession}
                      soundEnabled={soundEnabled}
                      finishBlock={(result) => {
                        setHistory([{...result, date: new Date()}, ...history]);
                        setCurrentView('summary');
                      }}
                      abortBlock={() => {
                        setActiveSession(null);
                        setCurrentView('dashboard');
                      }}
                   />;
          case 'summary':
            return <SummaryView 
                      session={history[0]} 
                      startBreak={() => setCurrentView('break')}
                      goHome={() => setCurrentView('dashboard')}
                   />;
          case 'break':
            return <BreakView 
                      duration={history[0]?.breakDuration || 10}
                      finishBreak={() => setCurrentView('dashboard')}
                      soundEnabled={soundEnabled}
                   />;
          case 'history':
            return <HistoryView 
                      history={history} 
                      goBack={() => setCurrentView('dashboard')}
                   />;
          default:
            return <DashboardView />;
        }
      };

      return (
        <div className="min-h-screen text-stone-800 font-sans selection:bg-teal-100">
          {currentView !== 'active' && currentView !== 'break' && (
            <nav className="max-w-4xl mx-auto p-4 flex justify-between items-center">
              <div 
                className="text-xl font-medium tracking-tight flex items-center gap-2 cursor-pointer text-stone-700"
                onClick={() => setCurrentView('dashboard')}
              >
                <div className="w-6 h-6 rounded-full bg-teal-600 flex items-center justify-center">
                  <div className="w-2 h-2 bg-white rounded-full"></div>
                </div>
                Простір
              </div>
              <div className="flex gap-4">
                <button onClick={() => setSoundEnabled(!soundEnabled)} className="text-stone-400 hover:text-stone-600 transition-colors">
                  <Icon name={soundEnabled ? "volume_up" : "volume_off"} size={20} />
                </button>
                <button onClick={() => setCurrentView('history')} className="text-stone-400 hover:text-stone-600 transition-colors">
                  <Icon name="history" size={20} />
                </button>
              </div>
            </nav>
          )}

          <main className="max-w-4xl mx-auto p-4 sm:p-6 pb-20">
            {renderView()}
          </main>
        </div>
      );
    }

    // --- ДАШБОРД ---
    function DashboardView({ goToCreate, goToHistory, history }) {
      const todayBlocks = history.filter(b => b.date.toDateString() === new Date().toDateString());
      const totalMinutesToday = todayBlocks.reduce((acc, curr) => acc + curr.totalWorkedMinutes, 0);

      return (
        <div className="fade-in pt-8 sm:pt-16">
          <header className="mb-12">
            <h1 className="text-3xl sm:text-4xl font-light mb-2">Доброго дня.</h1>
            <p className="text-stone-500">Ваш простір для сфокусованої роботи готовий.</p>
          </header>

          <div className="grid sm:grid-cols-2 gap-4 mb-12">
            <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100 flex flex-col justify-between items-start">
              <div className="p-3 bg-teal-50 text-teal-600 rounded-2xl mb-4">
                <Icon name="play_arrow" filled={true} size={24} />
              </div>
              <h3 className="text-lg font-medium mb-1">Новий блок</h3>
              <p className="text-stone-500 text-sm mb-6">Сплануйте задачі та розподіліть час.</p>
              <button 
                onClick={goToCreate}
                className="w-full py-3 bg-stone-900 text-white rounded-xl font-medium hover:bg-stone-800 transition-all active:scale-[0.98]"
              >
                Створити блок
              </button>
            </div>

            <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
              <div className="flex justify-between items-start mb-6">
                <div className="p-3 bg-stone-50 text-stone-600 rounded-2xl">
                  <Icon name="bar_chart" size={24} />
                </div>
                <span className="text-xs font-medium text-stone-400 uppercase tracking-wider">Сьогодні</span>
              </div>
              <div className="space-y-4">
                <div>
                  <div className="text-3xl font-light">{todayBlocks.length}</div>
                  <div className="text-sm text-stone-500">завершених блоків</div>
                </div>
                <div className="h-px w-full bg-stone-100"></div>
                <div>
                  <div className="text-3xl font-light">{Math.round(totalMinutesToday)}</div>
                  <div className="text-sm text-stone-500">хвилин фокусу</div>
                </div>
              </div>
            </div>
          </div>

          {history.length > 0 && (
            <div>
              <div className="flex justify-between items-end mb-4">
                <h3 className="text-lg font-medium text-stone-700">Останні сесії</h3>
                <button onClick={goToHistory} className="text-sm text-teal-600 hover:text-teal-700 font-medium">Всі записи &rarr;</button>
              </div>
              <div className="bg-white rounded-3xl p-2 shadow-sm border border-stone-100">
                {history.slice(0, 3).map((block, i) => (
                  <div key={i} className="flex justify-between items-center p-4 hover:bg-stone-50 rounded-2xl transition-colors">
                    <div>
                      <div className="font-medium">{block.title}</div>
                      <div className="text-xs text-stone-500">{block.date.toLocaleDateString()} • {block.completedTasks}/{block.totalTasks} задач</div>
                    </div>
                    <div className="text-stone-400 text-sm">
                      {Math.round(block.totalWorkedMinutes)} хв
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- СТВОРЕННЯ БЛОКУ (З ПЕРЕТЯГУВАННЯМ) ---
    function CreateBlockView({ config, setConfig, goBack, startBlock }) {
      const [newTaskTitle, setNewTaskTitle] = useState('');
      
      // Стан для функції перетягування
      const [draggedIndex, setDraggedIndex] = useState(null);

      const addTask = () => {
        if (!newTaskTitle.trim()) return;
        setConfig({
          ...config,
          tasks: [...config.tasks, { id: Date.now().toString(), title: newTaskTitle, priority: 'medium', completed: false }]
        });
        setNewTaskTitle('');
      };

      const removeTask = (id) => {
        setConfig({...config, tasks: config.tasks.filter(t => t.id !== id)});
      };

      const handleStart = () => {
        if (config.tasks.length === 0) return alert("Додайте хоча б одну задачу.");
        const tasksWithTime = calculateTaskTimes(config.tasks, config.workDuration, config.distributionMode);
        startBlock({ ...config, tasks: tasksWithTime, startTime: Date.now() });
      };

      // Функції для перетягування (Drag and Drop)
      const handleDragStart = (index) => {
        setDraggedIndex(index);
      };

      const handleDragEnter = (index) => {
        // Якщо ми просто навели на ту саму задачу - нічого не робимо
        if (draggedIndex === null || draggedIndex === index) return;

        const newTasks = [...config.tasks];
        const draggedItem = newTasks[draggedIndex];
        
        // Видаляємо задачу зі старого місця і ставимо на нове
        newTasks.splice(draggedIndex, 1);
        newTasks.splice(index, 0, draggedItem);
        
        setDraggedIndex(index);
        setConfig({ ...config, tasks: newTasks });
      };

      const handleDragEnd = () => {
        setDraggedIndex(null);
      };

      const previewTasks = calculateTaskTimes(config.tasks, config.workDuration, config.distributionMode);

      return (
        <div className="slide-in max-w-2xl mx-auto">
          <button onClick={goBack} className="flex items-center text-sm text-stone-500 hover:text-stone-800 mb-8 transition-colors">
            &larr; Назад
          </button>

          <div className="bg-white rounded-[2rem] p-6 sm:p-8 shadow-sm border border-stone-100 mb-6">
            <input 
              type="text" 
              value={config.title}
              onChange={(e) => setConfig({...config, title: e.target.value})}
              className="text-2xl sm:text-3xl font-light w-full border-none bg-transparent outline-none placeholder-stone-300 mb-8 focus:ring-0 p-0"
              placeholder="Назва блоку..."
            />

            <div className="grid grid-cols-2 gap-4 mb-8">
              <div className="bg-stone-50 p-4 rounded-2xl">
                <label className="text-xs text-stone-500 uppercase tracking-wider block mb-1">Фокус (хв)</label>
                <input 
                  type="number" 
                  value={config.workDuration}
                  onChange={(e) => setConfig({...config, workDuration: parseInt(e.target.value) || 0})}
                  className="text-2xl font-medium bg-transparent border-none outline-none w-full p-0 text-stone-800"
                  min="1"
                />
              </div>
              <div className="bg-stone-50 p-4 rounded-2xl">
                <label className="text-xs text-stone-500 uppercase tracking-wider block mb-1">Перерва (хв)</label>
                <input 
                  type="number" 
                  value={config.breakDuration}
                  onChange={(e) => setConfig({...config, breakDuration: parseInt(e.target.value) || 0})}
                  className="text-2xl font-medium bg-transparent border-none outline-none w-full p-0 text-stone-800"
                  min="0"
                />
              </div>
            </div>

            <div className="mb-6">
              <div className="flex justify-between items-end mb-4">
                <h3 className="text-lg font-medium">Задачі</h3>
                <div className="flex bg-stone-100 rounded-lg p-1">
                  <button 
                    className={`text-xs px-3 py-1.5 rounded-md transition-colors ${config.distributionMode === 'even' ? 'bg-white shadow-sm text-stone-800' : 'text-stone-500'}`}
                    onClick={() => setConfig({...config, distributionMode: 'even'})}
                  >Рівномірно</button>
                  <button 
                    className={`text-xs px-3 py-1.5 rounded-md transition-colors ${config.distributionMode === 'priority' ? 'bg-white shadow-sm text-stone-800' : 'text-stone-500'}`}
                    onClick={() => setConfig({...config, distributionMode: 'priority'})}
                  >За пріоритетом</button>
                </div>
              </div>

              <div className="space-y-3 mb-4">
                {previewTasks.map((task, idx) => (
                  <div 
                    key={task.id} 
                    draggable
                    onDragStart={() => handleDragStart(idx)}
                    onDragEnter={() => handleDragEnter(idx)}
                    onDragEnd={handleDragEnd}
                    onDragOver={(e) => e.preventDefault()}
                    className={`group flex items-center gap-2 bg-white border p-3 rounded-xl transition-all ${
                      draggedIndex === idx 
                        ? 'opacity-40 border-teal-400 border-dashed bg-teal-50/50' 
                        : 'border-stone-200 hover:border-teal-200'
                    }`}
                  >
                    {/* Іконка для перетягування */}
                    <div className="cursor-grab active:cursor-grabbing text-stone-300 hover:text-stone-500 flex items-center justify-center">
                      <Icon name="drag_indicator" size={20} />
                    </div>

                    <div className="w-6 h-6 flex-shrink-0 rounded-full border border-stone-300 flex items-center justify-center text-xs text-stone-400">
                      {idx + 1}
                    </div>
                    
                    <input 
                      type="text"
                      value={task.title}
                      onChange={(e) => {
                        const newTasks = [...config.tasks];
                        newTasks[idx].title = e.target.value;
                        setConfig({...config, tasks: newTasks});
                      }}
                      className="flex-grow border-none outline-none bg-transparent text-sm ml-1"
                    />
                    
                    {config.distributionMode === 'priority' && (
                      <select 
                        value={task.priority}
                        onChange={(e) => {
                          const newTasks = [...config.tasks];
                          newTasks[idx].priority = e.target.value;
                          setConfig({...config, tasks: newTasks});
                        }}
                        className="text-xs bg-stone-50 border-none outline-none rounded-md px-2 py-1 text-stone-600 cursor-pointer"
                      >
                        <option value="low">Низький</option>
                        <option value="medium">Середній</option>
                        <option value="high">Високий</option>
                      </select>
                    )}
                    
                    <div className="text-xs font-medium text-teal-600 bg-teal-50 px-2 py-1 rounded-md min-w-[50px] text-center">
                      {~~(task.assignedSeconds / 60)} хв
                    </div>

                    <button onClick={() => removeTask(task.id)} className="text-stone-300 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity ml-1">
                      <Icon name="delete" size={16} />
                    </button>
                  </div>
                ))}
              </div>

              <div className="flex items-center gap-3">
                <input 
                  type="text" 
                  value={newTaskTitle}
                  onChange={(e) => setNewTaskTitle(e.target.value)}
                  onKeyDown={(e) => e.key === 'Enter' && addTask()}
                  placeholder="Додати нову задачу..."
                  className="flex-grow border border-stone-200 rounded-xl p-3 text-sm outline-none focus:border-teal-400 transition-colors bg-stone-50"
                />
                <button onClick={addTask} className="p-3 bg-stone-100 text-stone-600 rounded-xl hover:bg-stone-200 transition-colors flex items-center justify-center">
                  <Icon name="add" size={20} />
                </button>
              </div>
            </div>
          </div>

          <button 
            onClick={handleStart}
            className="w-full flex items-center justify-center gap-2 py-4 bg-teal-600 text-white rounded-[1.5rem] font-medium text-lg hover:bg-teal-700 hover:shadow-lg hover:shadow-teal-600/20 transition-all active:scale-[0.98]"
          >
            Почати блок <Icon name="arrow_forward" size={20} />
          </button>
        </div>
      );
    }

    // --- АКТИВНИЙ БЛОК (ТАЙМЕР) ---
    function ActiveBlockView({ session, updateSession, soundEnabled, finishBlock, abortBlock }) {
      const [isRunning, setIsRunning] = useState(true);
      const [currentTaskIndex, setCurrentTaskIndex] = useState(0);
      const [timeLeft, setTimeLeft] = useState(session.tasks[0]?.assignedSeconds || 0);
      const [isDistractionFree, setIsDistractionFree] = useState(false);
      const [actualSecondsWorked, setActualSecondsWorked] = useState(0);

      const currentTask = session.tasks[currentTaskIndex];
      const isLastTask = currentTaskIndex === session.tasks.length - 1;

      useEffect(() => {
        let interval = null;
        if (isRunning && timeLeft > 0) {
          interval = setInterval(() => {
            setTimeLeft(prev => prev - 1);
            setActualSecondsWorked(prev => prev + 1);
          }, 1000);
        } else if (isRunning && timeLeft === 0) {
          if (soundEnabled) playSoftChime();
          if (!isLastTask) handleNextTask();
          else handleFinishBlock();
        }
        return () => clearInterval(interval);
      }, [isRunning, timeLeft, isLastTask]);

      const handleNextTask = () => {
        if (!isLastTask) {
          const nextIndex = currentTaskIndex + 1;
          setCurrentTaskIndex(nextIndex);
          setTimeLeft(session.tasks[nextIndex].assignedSeconds);
        } else handleFinishBlock();
      };

      const handleFinishBlock = () => {
        setIsRunning(false);
        const completedCount = session.tasks.filter(t => t.completed).length;
        finishBlock({
          title: session.title, breakDuration: session.breakDuration,
          totalTasks: session.tasks.length, completedTasks: completedCount,
          totalWorkedMinutes: actualSecondsWorked / 60, tasks: session.tasks
        });
      };

      const toggleTaskCompletion = (taskId) => {
        const updatedTasks = session.tasks.map(t => t.id === taskId ? { ...t, completed: !t.completed } : t);
        updateSession({ ...session, tasks: updatedTasks });
      };

      const totalSessionSeconds = session.tasks.reduce((sum, t) => sum + t.assignedSeconds, 0);
      const secondsElapsedGlobal = totalSessionSeconds - session.tasks.slice(currentTaskIndex + 1).reduce((sum, t) => sum + t.assignedSeconds, 0) - timeLeft;
      const progressPercent = (secondsElapsedGlobal / totalSessionSeconds) * 100;

      return (
        <div className={`fade-in flex flex-col items-center justify-center min-h-[80vh] ${isDistractionFree ? 'mt-0' : 'mt-4'}`}>
          <button 
            onClick={() => setIsDistractionFree(!isDistractionFree)}
            className="absolute top-6 right-6 text-stone-400 hover:text-stone-600 bg-white/50 p-2 rounded-full backdrop-blur transition-all"
            title="Режим фокусу"
          >
            <Icon name={isDistractionFree ? "fullscreen_exit" : "fullscreen"} size={20} />
          </button>

          {!isDistractionFree && (
            <div className="w-full max-w-md mb-12 text-center">
              <div className="text-sm font-medium text-stone-400 uppercase tracking-widest mb-4">{session.title}</div>
              <div className="h-1.5 w-full bg-stone-200 rounded-full overflow-hidden">
                <div className="h-full bg-teal-500 transition-all duration-1000 ease-linear" style={{ width: `${progressPercent}%` }}></div>
              </div>
            </div>
          )}

          <div className="text-center mb-8 max-w-lg px-4">
            <div className="text-stone-400 text-sm mb-2 flex justify-center items-center gap-2">
              <span className="w-2 h-2 rounded-full bg-teal-500 animate-pulse"></span>
              Поточна задача ({currentTaskIndex + 1} з {session.tasks.length})
            </div>
            <h2 className="text-2xl sm:text-3xl font-medium text-stone-800 break-words">{currentTask.title}</h2>
          </div>

          <div className="text-[6rem] sm:text-[8rem] font-light text-stone-900 tracking-tighter leading-none mb-12 tabular-nums">
            {formatTime(timeLeft)}
          </div>

          <div className="flex items-center gap-6 mb-16">
            <button onClick={abortBlock} className="w-12 h-12 flex items-center justify-center rounded-full text-stone-400 hover:text-red-500 hover:bg-red-50 transition-colors">
              <Icon name="stop" size={20} />
            </button>
            <button onClick={() => setIsRunning(!isRunning)} className={`w-20 h-20 flex items-center justify-center rounded-full text-white shadow-xl transition-all hover:scale-105 active:scale-95 ${isRunning ? 'bg-stone-800 shadow-stone-800/20' : 'bg-teal-600 shadow-teal-600/30'}`}>
              <Icon name={isRunning ? "pause" : "play_arrow"} filled={true} size={32} />
            </button>
            <button onClick={handleNextTask} className="w-12 h-12 flex items-center justify-center rounded-full text-stone-400 hover:text-teal-600 hover:bg-teal-50 transition-colors">
              <Icon name="skip_next" size={20} />
            </button>
          </div>

          {!isDistractionFree && (
            <div className="w-full max-w-md bg-white rounded-3xl p-6 shadow-sm border border-stone-100">
              <h3 className="text-sm font-medium text-stone-500 mb-4 flex items-center gap-2">
                <Icon name="list" size={16} /> Чекліст
              </h3>
              <div className="space-y-3">
                {session.tasks.map((task, idx) => (
                  <div key={task.id} className={`flex items-start gap-3 p-3 rounded-xl transition-all cursor-pointer border ${idx === currentTaskIndex ? 'border-teal-200 bg-teal-50/30' : 'border-transparent hover:bg-stone-50'}`} onClick={() => toggleTaskCompletion(task.id)}>
                    <div className={`mt-0.5 transition-colors ${task.completed ? 'text-teal-500' : 'text-stone-300'}`}>
                      <Icon name={task.completed ? "check_circle" : "radio_button_unchecked"} size={20} />
                    </div>
                    <div className={`flex-grow text-sm ${task.completed ? 'text-stone-400 line-through' : 'text-stone-700'} ${idx === currentTaskIndex ? 'font-medium' : ''}`}>
                      {task.title}
                    </div>
                    {idx > currentTaskIndex && (
                      <div className="text-xs text-stone-400 whitespace-nowrap">{~~(task.assignedSeconds / 60)} хв</div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- ЕКРАН ПЕРЕРВИ ---
    function BreakView({ duration, finishBreak, soundEnabled }) {
      const [timeLeft, setTimeLeft] = useState(duration * 60);

      useEffect(() => {
        if (timeLeft <= 0) {
          if(soundEnabled) playSoftChime();
          finishBreak(); return;
        }
        const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
        return () => clearInterval(timer);
      }, [timeLeft, finishBreak, soundEnabled]);

      return (
        <div className="fade-in flex flex-col items-center justify-center min-h-[70vh] text-center">
          <div className="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-8">
            <Icon name="schedule" size={32} />
          </div>
          <h2 className="text-2xl font-light text-stone-500 mb-2">Час відпочити</h2>
          <p className="text-stone-400 text-sm mb-12">Відведіть погляд від екрану, зробіть ковток води.</p>
          <div className="text-7xl font-light text-blue-900 tracking-tighter mb-16 tabular-nums">{formatTime(timeLeft)}</div>
          <button onClick={finishBreak} className="px-6 py-3 bg-white border border-stone-200 text-stone-600 rounded-xl hover:bg-stone-50 transition-colors text-sm font-medium">Пропустити перерву</button>
        </div>
      );
    }

    // --- ПІДСУМОК ---
    function SummaryView({ session, startBreak, goHome }) {
      if (!session) return null;
      const isPerfect = session.completedTasks === session.totalTasks;

      return (
        <div className="slide-in max-w-lg mx-auto pt-10">
          <div className="bg-white rounded-[2.5rem] p-8 sm:p-10 shadow-sm border border-stone-100 text-center relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-teal-400 to-emerald-400"></div>
            <div className="w-20 h-20 mx-auto bg-stone-50 rounded-full flex items-center justify-center mb-6">
              <Icon name="check_circle" filled={isPerfect} size={40} className={isPerfect ? "text-teal-500" : "text-stone-400"} />
            </div>
            <h2 className="text-3xl font-light mb-2">Блок завершено</h2>
            <p className="text-stone-500 mb-8">Ви чудово попрацювали. Ось результати сесії.</p>

            <div className="grid grid-cols-2 gap-4 mb-8 text-left">
              <div className="bg-stone-50 p-4 rounded-2xl">
                <div className="text-stone-400 text-xs uppercase tracking-wider mb-1">Фокус</div>
                <div className="text-2xl font-medium text-stone-800">{Math.round(session.totalWorkedMinutes)} хв</div>
              </div>
              <div className="bg-stone-50 p-4 rounded-2xl">
                <div className="text-stone-400 text-xs uppercase tracking-wider mb-1">Задачі</div>
                <div className="text-2xl font-medium text-stone-800">{session.completedTasks} / {session.totalTasks}</div>
              </div>
            </div>

            <div className="text-left mb-8">
              <div className="text-sm font-medium text-stone-600 mb-3 px-2">Що було зроблено:</div>
              <div className="space-y-2 max-h-48 overflow-y-auto pr-2">
                {session.tasks.map(t => (
                  <div key={t.id} className="flex items-center gap-2 text-sm">
                    <div className={t.completed ? "text-teal-500" : "text-stone-300"}>
                      <Icon name={t.completed ? "check_circle" : "radio_button_unchecked"} size={16} />
                    </div>
                    <span className={t.completed ? "text-stone-800" : "text-stone-400"}>{t.title}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="flex flex-col gap-3">
              <button onClick={startBreak} className="w-full py-4 bg-teal-600 text-white rounded-2xl font-medium hover:bg-teal-700 transition-colors">
                Почати перерву ({session.breakDuration} хв)
              </button>
              <button onClick={goHome} className="w-full py-4 bg-transparent text-stone-500 hover:bg-stone-50 rounded-2xl font-medium transition-colors">
                На головну
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- ІСТОРІЯ ---
    function HistoryView({ history, goBack }) {
      return (
        <div className="fade-in max-w-2xl mx-auto">
          <div className="flex items-center mb-8 gap-4">
            <button onClick={goBack} className="p-2 bg-white rounded-full shadow-sm hover:bg-stone-50 text-stone-600">
              <Icon name="chevron_right" size={20} className="rotate-180" />
            </button>
            <h2 className="text-2xl font-medium text-stone-800">Історія блоків</h2>
          </div>

          {history.length === 0 ? (
            <div className="text-center py-20 bg-white rounded-3xl border border-stone-100 border-dashed">
              <Icon name="history" size={48} className="text-stone-300 mb-4" />
              <p className="text-stone-500">Ви ще не завершили жодного блоку.</p>
            </div>
          ) : (
            <div className="space-y-4">
              {history.map((block, idx) => (
                <div key={idx} className="bg-white p-5 rounded-2xl shadow-sm border border-stone-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                  <div>
                    <h3 className="font-medium text-lg text-stone-800 mb-1">{block.title}</h3>
                    <div className="text-sm text-stone-400 flex items-center gap-2">
                      <Icon name="schedule" size={14} /> {block.date.toLocaleString('uk-UA', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' })}
                    </div>
                  </div>
                  <div className="flex items-center gap-6">
                    <div className="text-right">
                      <div className="text-xs text-stone-400 uppercase tracking-wider mb-0.5">Фокус</div>
                      <div className="font-medium text-stone-700">{Math.round(block.totalWorkedMinutes)} хв</div>
                    </div>
                    <div className="w-px h-8 bg-stone-100"></div>
                    <div className="text-right">
                      <div className="text-xs text-stone-400 uppercase tracking-wider mb-0.5">Задачі</div>
                      <div className="font-medium text-stone-700">
                        <span className={block.completedTasks === block.totalTasks ? 'text-teal-600' : ''}>{block.completedTasks}</span> / {block.totalTasks}
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Запуск React застосунку
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
